# Ejemplo opcional: WAMP / Apache como proxy hacia uvicorn (8092).
# Habilitar mod_proxy y mod_proxy_http en WAMP, incluir en httpd-vhosts.conf.

<VirtualHost *:80>
    ServerName aula-sync.tudominio.edu.pe

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8092/
    ProxyPassReverse / http://127.0.0.1:8092/
</VirtualHost>
